 <!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="style.css">
</head>

    <div class="registration-card">
</body>
</html>
  <h2>Supplier Registration</h2>
  <p>Register a new supplier for the NyondoStock system.</p>

  <form class="grid-form">
    <div class="form-group">
        <label for="company">Company Name</label>
        <input type="text" id="company" placerholder="e.g. , Nyondo Logistics Ltd" required>
        </div>

        <div class="form-group">
            <label for="tin">Tax ID(TIN)</label>
            <input type="text" id="tin" placeholder="100-XXXX-XXXX" required>
            </div>

            <div class="form-group">
                <label for="contact">Contact Person</label>
                <input type="text" id="contact" placeholder="Full Name">
            </div>

            <div class="form-group">
                <label for="email">Business Email</label>
                <input type="email" id="email" placeholder="orders@company,com" required>
            </div>

            <div class="form-group full-width">
                <label for="address">Physical Address</label>
                <textarea id="address" rows="3" placeholder="Warehouse Location, Street, City"></textarea>
            </div>

            <div class="form-group">
                <label for="category">Supply Category</label>
                <select id="category">
                    <option value="electronics">Electronics & IT</option>
                    <option value="stationery">Office Stationery</option>
                    <option value="raw-materials">Raw Materials</option>
                    <option value="furniture">Furniture</option></select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="+256 ...">
            </div>

            <button type="submit"
        class="submit-btn">Complete Registration</button>
        </form>
            </div>
    </body>
    </html>
